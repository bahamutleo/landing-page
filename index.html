<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Product Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white font-sans text-slate-900 pb-24">
    <div class="max-w-md mx-auto bg-white min-h-screen relative shadow-sm">
        
        <div class="bg-black py-2 px-4 text-center">
            <p class="text-[10px] font-bold flex items-center justify-center gap-2 text-white uppercase tracking-[0.2em]">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-2.235-2.767A1 1 0 0 0 18.77 9H15v9"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>
                Shipping take 1-3 days
            </p>
        </div>

          <header class="py-4 px-4 flex justify-center border-b border-slate-50">
            <div class="w-[182px] h-[55px] flex items-center justify-center overflow-hidden">
                <img id="site-logo" src="" alt="Logo" class="max-w-full max-h-full object-contain">
            </div>
          </header>

        <section class="p-4 space-y-4 relative">
            <div class="gallery-main relative w-full aspect-square bg-slate-100 rounded-xl overflow-hidden">
                <img id="main-1" src="" class="img-1 absolute inset-0 w-full h-full object-cover hidden">
                <img id="main-2" src="" class="img-2 absolute inset-0 w-full h-full object-cover hidden">
                <img id="main-3" src="" class="img-3 absolute inset-0 w-full h-full object-cover hidden">
                <img id="main-4" src="" class="img-4 absolute inset-0 w-full h-full object-cover hidden">
            </div>

            <div class="gallery-thumbs flex gap-3 overflow-x-auto no-scrollbar py-2">
                <label onclick="changeImage(1)" class="flex-shrink-0 w-20 h-20 border-2 rounded-lg overflow-hidden cursor-pointer"><img id="thumb-1" src="" class="w-full h-full object-cover"></label>
                <label onclick="changeImage(2)" class="flex-shrink-0 w-20 h-20 border-2 rounded-lg overflow-hidden cursor-pointer"><img id="thumb-2" src="" class="w-full h-full object-cover"></label>
                <label onclick="changeImage(3)" class="flex-shrink-0 w-20 h-20 border-2 rounded-lg overflow-hidden cursor-pointer"><img id="thumb-3" src="" class="w-full h-full object-cover"></label>
                <label onclick="changeImage(4)" class="flex-shrink-0 w-20 h-20 border-2 rounded-lg overflow-hidden cursor-pointer"><img id="thumb-4" src="" class="w-full h-full object-cover"></label>
            </div>
        </section>

        <section class="p-6 border-y border-slate-50">
            <h2 class="text-[10px] font-bold mb-3 text-slate-400 uppercase tracking-[0.2em]">Product Description</h2>
            <p id="prod-desc" class="text-slate-600 leading-relaxed text-sm">Loading...</p>
        </section>

        <section class="p-6">
            <div class="text-center mb-12">
                <h2 class="text-4xl font-black tracking-tighter text-slate-900">6大核心功能</h2>
                <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-slate-300">Features</p>
            </div>
            <div class="space-y-10">
                <div class="flex items-center gap-6"><div class="w-16 h-16 bg-slate-50 rounded-full overflow-hidden flex-shrink-0"><img id="feature-img-1" src="" class="w-full h-full object-cover"></div><p id="feature-text-1" class="text-[11px] text-slate-500">Loading...</p></div>
                <div class="flex items-center gap-6"><div class="w-16 h-16 bg-slate-50 rounded-full overflow-hidden flex-shrink-0"><img id="feature-img-2" src="" class="w-full h-full object-cover"></div><p id="feature-text-2" class="text-[11px] text-slate-500">Loading...</p></div>
                <div class="flex items-center gap-6"><div class="w-16 h-16 bg-slate-50 rounded-full overflow-hidden flex-shrink-0"><img id="feature-img-3" src="" class="w-full h-full object-cover"></div><p id="feature-text-3" class="text-[11px] text-slate-500">Loading...</p></div>
                <div class="flex items-center gap-6"><div class="w-16 h-16 bg-slate-50 rounded-full overflow-hidden flex-shrink-0"><img id="feature-img-4" src="" class="w-full h-full object-cover"></div><p id="feature-text-4" class="text-[11px] text-slate-500">Loading...</p></div>
                <div class="flex items-center gap-6"><div class="w-16 h-16 bg-slate-50 rounded-full overflow-hidden flex-shrink-0"><img id="feature-img-5" src="" class="w-full h-full object-cover"></div><p id="feature-text-5" class="text-[11px] text-slate-500">Loading...</p></div>
                <div class="flex items-center gap-6"><div class="w-16 h-16 bg-slate-50 rounded-full overflow-hidden flex-shrink-0"><img id="feature-img-6" src="" class="w-full h-full object-cover"></div><p id="feature-text-6" class="text-[11px] text-slate-500">Loading...</p></div>
            </div>
        </section>

        <section class="p-6 bg-slate-50">
            <h2 class="text-[10px] font-bold text-center mb-8 uppercase tracking-[0.3em] text-slate-400">Ingredient</h2>
            <div class="mb-8 aspect-[3/4] bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
                <img id="ing-main" src="" class="w-full h-full object-cover">
            </div>
            <div class="space-y-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white rounded-lg border border-slate-100 flex-shrink-0 overflow-hidden">
                        <img id="ing-icon-1" src="" class="w-full h-full object-cover">
                    </div>
                    <p id="ing-desc-1" class="text-[10px] text-slate-400 uppercase tracking-widest">Loading...</p>
                </div>
            </div>
        </section>

        <section class="p-6">
            <h2 class="text-[10px] font-bold text-center mb-8 uppercase tracking-[0.3em] text-slate-300">Testimonial</h2>
            <div class="flex gap-4 overflow-x-auto pb-4 snap-x no-scrollbar">
                <div class="flex-shrink-0 w-64 aspect-[9/16] bg-white rounded-xl border border-slate-100 shadow-sm snap-center overflow-hidden">
                    <img id="testi-1" src="" class="w-full h-full object-cover">
                </div>
                <div class="flex-shrink-0 w-64 aspect-[9/16] bg-white rounded-xl border border-slate-100 shadow-sm snap-center overflow-hidden">
                    <img id="testi-2" src="" class="w-full h-full object-cover">
                </div>
            </div>
        </section>

        <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t p-2 flex items-center gap-3 z-50 max-w-md mx-auto">
            <a id="wa-link" href="#" class="flex-[3] bg-[#25D366] text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-colors">Whatsapp</a>
            <div class="flex-1 text-center font-black text-slate-900 text-lg" id="price-tag">RM--</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
</body>
</html>
